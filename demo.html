<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>MNB Editor Rebuild v6</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./mnb-editor.css" />
    <style>
      .editor-bottom-panel {
        margin-top: 18px;
        padding: 16px;
        border: 1px solid #e2e8f0;
        border-radius: 14px;
        background: #f8fafc;
      }

      .editor-bottom-panel h3 {
        margin: 0 0 12px;
        font-size: 16px;
        color: #0f172a;
      }

      .editor-bottom-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 12px;
      }

      .editor-bottom-actions button {
        appearance: none;
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        background: #2563eb;
        color: #fff;
      }

      .editor-bottom-actions button:hover {
        opacity: 0.95;
      }

      #editorOutput {
        min-height: 120px;
        max-height: 320px;
        overflow: auto;
        margin: 0;
        padding: 12px;
        border-radius: 10px;
        background: #0f172a;
        color: #e2e8f0;
        font-size: 13px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <div style="max-width:1400px;margin:30px auto;padding:0 16px;">
      <div style="margin-bottom:18px;">
        <h1 style="margin:0 0 8px;">MNB Editor Rebuild v6</h1>
        <p style="margin:0;color:#64748b;">
          Docs-style multi-row toolbar with a ruler and draggable left/right
          page margins. Add a new feature by creating a tool file and importing
          it in <code>src/mnb-editor.main.js</code>.
        </p>
      </div>

      <div id="editor"></div>

      <div class="editor-bottom-panel">
        <h3>Editor Options</h3>
        <div class="editor-bottom-actions">
          <button type="button" id="getEditorBtn">Get Editor</button>
          <button type="button" id="getHtmlBtn">Get HTML</button>
          <button type="button" id="getTextBtn">Get Text</button>
        </div>
        <pre id="editorOutput">Click a button to inspect editor data.</pre>
      </div>
    </div>

    <script type="module">
      import { mountMNBEditor } from './src/mnb-editor.main.js';

      const editor = mountMNBEditor('#editor', {
        theme: 'light',
        height: '500px',
        toolbarCollapsible: true,
        collapseToolbarBelow: 9999,
        collapsedToolbarRows: 2,
        contentLimit: {
          max: 500,
          type: 'chars',
          mode: 'hard',
          showCounter: true
        },
        logsEndpoint: './api.php',

        imageUploadEndpoint: './upload-image.php',
        imageUploadFieldName: 'image',
        imageUploadMethod: 'POST',
        imageUploadCredentials: 'same-origin',

        videoUploadEndpoint: './upload-video.php',
        videoUploadFieldName: 'video',
        videoUploadMethod: 'POST',
        videoUploadCredentials: 'same-origin',

        otherFilesAccept: '.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.zip,.txt',
        otherFileUploadEndpoint: './upload-file.php',
        otherFileUploadFieldName: 'file',
        otherFileUploadMethod: 'POST',
        otherFileUploadCredentials: 'same-origin',

        galleryUploadEndpoint: './gallery.php',
        galleryUploadFieldName: 'image',
        galleryUploadMethod: 'POST',
        galleryUploadCredentials: 'same-origin',
      });

      const output = document.getElementById('editorOutput');

      document.getElementById('getEditorBtn').addEventListener('click', () => {
        window.mnbEditor = editor;

        const info = {
          message: 'Editor instance saved to window.mnbEditor',
          availableMethods: Object.keys(editor).filter((key) => typeof editor[key] === 'function'),
        };

        output.textContent = JSON.stringify(info, null, 2);
        console.log('MNB Editor instance:', editor);
      });

      document.getElementById('getHtmlBtn').addEventListener('click', () => {
        try {
          output.textContent = editor.getHTML ? editor.getHTML() : 'getHTML() method not found.';
        } catch (error) {
          output.textContent = 'Error getting HTML: ' + error.message;
        }
      });

      document.getElementById('getTextBtn').addEventListener('click', () => {
        try {
          output.textContent = editor.getText ? editor.getText() : 'getText() method not found.';
        } catch (error) {
          output.textContent = 'Error getting text: ' + error.message;
        }
      });
    </script>
  </body>
</html>
